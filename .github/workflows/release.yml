name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install openssl --version=3.3.2 -y --no-progress
          Add-Content $env:GITHUB_ENV "OPENSSL_DIR=C:\Program Files\OpenSSL-Win64"
          Add-Content $env:GITHUB_ENV "OPENSSL_LIB_DIR=C:\Program Files\OpenSSL-Win64\lib"
          Add-Content $env:GITHUB_ENV "OPENSSL_INCLUDE_DIR=C:\Program Files\OpenSSL-Win64\include"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DJ Tag Studio ${{ github.ref_name }}
          releaseBody: |
            ## DJ Tag Studio ${{ github.ref_name }}

            Desktop app for Rekordbox My Tag workflows.

            ### macOS
            - **Apple Silicon:** `*_aarch64.dmg`
            - **Intel Mac:** `*_x64.dmg`

            ### Windows
            - `*.msi`

            Close Rekordbox before writing tags. See [README](https://github.com/mountainstar/dj-tag-studio#usage) for setup.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
